name: BusAuto — Google Merchant Center Feed

# Щодня о 07:00 UTC = 10:00 Київ — тільки змінені товари (~5 хв)
# Раз на тиждень повний синк паралельно (3 воркери = ~40 хв замість 2 год)
on:
  schedule:
    - cron: '0 7 * * *'       # щодня 10:00 — daily режим
    - cron: '0 5 * * 1'       # щопонеділка 08:00 — повний синк
  workflow_dispatch:
    inputs:
      mode:
        description: 'Режим синхронізації'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - full

# ── ЩОДЕННИЙ ШВИДКИЙ СИНК (тільки змінені товари) ──────────────────
jobs:
  daily-sync:
    name: Daily sync (changed products only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Запускається щодня по розкладу, або вручну з mode=daily
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-auth requests

      - name: Create configs
        run: |
          printf '[odoo]\nurl = https://busauto.ua\ndatabase = busauto\nusername = busauto.ua@gmail.com\napi_key = %s\n' "${{ secrets.ODOO_API_KEY }}" > odoo_config.txt
          echo '${{ secrets.GOOGLE_MERCHANT_KEY_JSON }}' > google_merchant_key.json

      - name: Daily sync — only changed products
        run: python push_to_merchant_api.py --mode daily --days 2

      - name: Notify Telegram — daily result
        if: always()
        run: |
          python3 -c "
          import urllib.request, json, subprocess
          status = '${{ job.status }}'
          icon = '✅' if status == 'success' else '❌'
          try:
            log = open('merchant_api.log').read()
            lines = [l for l in log.splitlines() if any(k in l for k in ['Успішно','Помилок','товар','записів','Мови'])]
            summary = '\n'.join(lines[-4:]) if lines else '\n'.join(log.splitlines()[-3:])
          except:
            summary = 'лог відсутній'
          msg = (f'{icon} *Google Merchant · Daily sync*\n'
                 f'{summary}\n\n'
                 f'[📊 Merchant Center](https://merchants.google.com/mc/products/diagnostics?a=163800443)  '
                 f'[📈 Google Ads](https://ads.google.com/aw/overview)')
          data = json.dumps({'chat_id': '${{ secrets.TELEGRAM_CHAT_ID }}', 'text': msg, 'parse_mode': 'Markdown', 'disable_web_page_preview': True}).encode()
          req = urllib.request.Request('https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage', data=data, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req, timeout=10)
          print('Telegram OK')
          " || echo "Telegram notify failed (non-critical)"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-log-${{ github.run_number }}
          path: merchant_api.log
          retention-days: 14

# ── ПОВНИЙ СИНК ПАРАЛЕЛЬНО (3 воркери) ─────────────────────────────
  full-sync:
    name: Full sync — worker ${{ matrix.worker }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Запускається в понеділок або вручну з mode=full
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 5 * * 1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'full')

    strategy:
      matrix:
        include:
          - worker: 1
            offset: 0
            count: 40000
          - worker: 2
            offset: 40000
            count: 40000
          - worker: 3
            offset: 80000
            count: 60000
      fail-fast: false   # якщо один впав — інші продовжують

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-auth requests

      - name: Create configs
        run: |
          printf '[odoo]\nurl = https://busauto.ua\ndatabase = busauto\nusername = busauto.ua@gmail.com\napi_key = %s\n' "${{ secrets.ODOO_API_KEY }}" > odoo_config.txt
          echo '${{ secrets.GOOGLE_MERCHANT_KEY_JSON }}' > google_merchant_key.json

      - name: Full sync — worker ${{ matrix.worker }} (offset ${{ matrix.offset }})
        run: |
          python push_to_merchant_api.py \
            --mode full \
            --offset ${{ matrix.offset }} \
            --count ${{ matrix.count }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-log-worker${{ matrix.worker }}-${{ github.run_number }}
          path: merchant_api.log
          retention-days: 30
