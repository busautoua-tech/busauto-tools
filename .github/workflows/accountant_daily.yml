name: Accountant Daily Digest

on:
  # Щодня з понеділка по п'ятницю о 07:00 UTC = 10:00 Київ
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  accountant-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet tzdata

      - name: Create config files from secrets
        run: |
          printf '[odoo]\nurl = https://busauto.ua\ndatabase = busauto\nusername = busauto.ua@gmail.com\napi_key = %s\n' "${{ secrets.ODOO_API_KEY }}" > odoo_config.txt
          printf '[telegram]\nbot_token = %s\nchat_id = %s\nchat_id_accountant = %s\n' \
            "${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            "${{ secrets.TELEGRAM_CHAT_ID }}" \
            "${{ secrets.TELEGRAM_CHAT_ID_ACCOUNTANT }}" > telegram_config.txt
          mkdir -p dashboard_data

      - name: Run operational export
        run: python odoo_export.py
        timeout-minutes: 10

      - name: Run finance export
        run: python finance_export.py
        timeout-minutes: 20

      - name: Send accountant digest
        run: python finance_digest.py --mode accountant
