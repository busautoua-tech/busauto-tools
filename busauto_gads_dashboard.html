  .kpi-label { font-size: 0.72rem; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }

const rows = RAW.daily_by_account;

function accStats(name) {
  const r = rows.filter(d => d.account === name);
  const cost    = r.reduce((s, d) => s + d.cost, 0);
  const cv      = r.reduce((s, d) => s + d.conv_value, 0);
  const conv    = r.reduce((s, d) => s + d.conversions, 0);
  const clicks  = r.reduce((s, d) => s + d.clicks, 0);
  const impr    = r.reduce((s, d) => s + d.impressions, 0);
  return { cost, cv, conv, clicks, impr, roas: cv/cost, cpa: cost/conv, ctr: clicks/impr*100 };
}

  { label: 'Кліків (30д)', value: fmt(total.clicks, 0), sub: `CTR сер. ${((busauto.ctr + automobil.ctr)/2).toFixed(2)}%`, color: 'teal' },
];

const grid = document.getElementById('kpiGrid');
kpis.forEach(k => {
  const d = document.createElement('div');
  d.className = 'kpi-card ' + k.color;
  d.innerHTML = `<div class="kpi-label">${k.label}</div><div class="kpi-value">${k.value}</div><div class="kpi-sub">${k.sub}</div>${k.badge ? `<span class="kpi-badge ${k.badgeClass}">${k.badge}</span>` : ''}`;
  grid.appendChild(d);
});

// ─── ACCOUNT CARDS ────────────────────────────────────────────────────────────
function renderMetrics(elId, stats, budget) {
  const el = document.getElementById(elId);
  const items = [
    { label: 'ROAS', value: stats.roas.toFixed(2) + 'x' },
    { label: 'Витрати', value: fmtUAH(stats.cost), sub: `~${fmtUAH(stats.cost/30)}/день` },
    { label: 'Дохід', value: fmtUAH(stats.cv), sub: `${((stats.cv/total.cv)*100).toFixed(0)}% від заг.` },
    { label: 'CPA', value: fmtUAH(stats.cpa), sub: `${stats.conv.toFixed(0)} конверсій` },
    { label: 'Кліки', value: stats.clicks.toLocaleString(), sub: `CTR ${stats.ctr.toFixed(2)}%` },
    { label: 'Частка бюдж.', value: ((stats.cost/total.cost)*100).toFixed(0) + '%', sub: `від 103 тис ₴ загал.` },
  ];
  el.innerHTML = items.map(i => `<div class="metric-item"><div class="metric-label">${i.label}</div><div class="metric-value">${i.value}</div>${i.sub ? `<div class="metric-sub">${i.sub}</div>` : ''}</div>`).join('');
}
renderMetrics('busautoMetrics', busauto);
renderMetrics('automobilMetrics', automobil);

// ─── ALERTS ───────────────────────────────────────────────────────────────────
const alerts = [];
const roasDiff = busauto.roas / automobil.roas;
if (roasDiff > 2) alerts.push({ type: 'warn', icon: '⚠️', text: `<strong>Великий розрив ROAS:</strong> busauto.kh.ua (${busauto.roas.toFixed(2)}x) в ${roasDiff.toFixed(1)} рази ефективніший за automobil.in.ua (${automobil.roas.toFixed(2)}x). Рекомендація: перекинути 20-30% бюджету з automobil на busauto.` });
if (automobil.roas < 2.5) alerts.push({ type: 'danger', icon: '🔴', text: `<strong>automobil.in.ua ROAS нижче 2.5x.</strong> CPA ${fmtUAH(automobil.cpa)} — перевірте PMax кампанії. Дублювання PMax SHAFER між акаунтами з'їдає бюджет.` });
alerts.push({ type: 'info', icon: '💡', text: `<strong>Потенціал busauto.kh.ua:</strong> при ROAS ${busauto.roas.toFixed(2)}x і поточному бюджеті ${fmtUAH(busauto.cost/30)}/день — збільшення на 30% дасть +${fmtUAH(busauto.cost/30*0.3*busauto.roas)}/день доходу без нових креативів.` });
alerts.push({ type: 'info', icon: '🔜', text: `<strong>busauto.ua — наступний акаунт.</strong> Основний сайт ще не має Google Ads. Після доробки кошика — запуск окремого акаунту. Очікуваний ефект: +15-25% до поточного доходу.` });

const alertsEl = document.getElementById('alertsSection');
alerts.forEach(a => {
  const d = document.createElement('div');
  d.className = 'alert-box ' + a.type;
  d.innerHTML = `<span class="alert-icon">${a.icon}</span><div class="alert-text">${a.text}</div>`;
  alertsEl.appendChild(d);
});

// ─── CHART CONFIG ─────────────────────────────────────────────────────────────
Chart.defaults.color = '#718096';
Chart.defaults.borderColor = '#2d3748';
Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
Chart.defaults.font.size = 11;

new Chart(document.getElementById('roasChart'), {
  type: 'line',
  data: {
    labels: shortDates,

      { label: 'busauto.kh.ua', data: dailyRoas('busauto.kh.ua'), borderColor: busautoColor, backgroundColor: 'rgba(66,153,225,0.08)', tension: 0.3, pointRadius: 2, borderWidth: 2, fill: true },
      { label: 'automobil.in.ua', data: dailyRoas('automobil.in.ua'), borderColor: automobilColor, backgroundColor: 'rgba(246,173,85,0.08)', tension: 0.3, pointRadius: 2, borderWidth: 2, fill: true },
      { label: 'Ціль (ROAS 4x)', data: dates.map(() => 4), borderColor: '#48bb78', borderDash: [6,4], borderWidth: 1.5, pointRadius: 0 },
      { label: 'Мінімум (ROAS 2x)', data: dates.map(() => 2), borderColor: '#e53e3e', borderDash: [4,4], borderWidth: 1, pointRadius: 0 },
    ]
  },
  options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.raw}x` } } }, scales: { y: { grid: { color: '#2d3748' }, ticks: { callback: v => v + 'x' } }, x: { grid: { color: '#1a202c' } } } }
});

});

new Chart(document.getElementById('convChart'), {
